<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MyAccounting Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        emailjs.init("yFSFUYsNrUcc_dUo_");
    </script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); color: #fff; text-align: center;
        }
        h2 { margin-top: 0; margin-bottom: 25px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .instruction { font-size: 0.9em; color: rgba(255,255,255,0.7); margin-bottom: 25px; line-height: 1.5; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; padding-right: 40px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); }
        .input-group label {
            position: absolute; left: 15px; top: 12px; color: rgba(255, 255, 255, 0.5); pointer-events: none; transition: 0.3s ease all;
        }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label {
            top: -10px; left: 10px; font-size: 12px; color: #00f2fe; background: #232239; padding: 0 5px; border-radius: 4px;
        }
        
        .btn-custom {
            width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: white;
            padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: transform 0.3s; margin-top: 10px;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn-custom:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        .btn-custom:disabled { background: linear-gradient(135deg, #a4b0be 0%, #ced6e0 100%); cursor: not-allowed; box-shadow: none; color: #57606f; }
        .bottom-link { margin-top: 25px; display: block; font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .bottom-link a { color: #00f2fe; text-decoration: none; font-weight: 600; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <form onsubmit="handleSendOTP(event)">
            <h2>Password Recovery</h2>
            <p class="instruction">Enter the email address associated with your account and we'll send you an OTP to reset your password.</p>
            
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label>Email Address</label>
            </div>
            
            <button type="submit" id="submitBtn" class="btn-custom">Send OTP Code</button>
            
            <div class="bottom-link">
                Remember your password? <a href="login.html">Log In</a>
            </div>
        </form>
    </div>

    <script>
        function handleSendOTP(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            if (!userExists(email)) return alert("This email is not registered in our system.");
            
            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating OTP...';
            
            const otp = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem("otp", otp);
            localStorage.setItem("resetEmail", email);
            
            // Simulating an email send without an API key (Development Mode)
            setTimeout(() => {
                alert("🛠️ DEV MODE: An email would be sent here.\n\nYour OTP code is: " + otp);
                
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Sent Successfully';
                btn.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                btn.style.color = '#fff';
                
                setTimeout(() => {
                    window.location.href = "verify_otp.html";
                }, 800);
            }, 1000);
        }
    </script>
</body>
</html>
