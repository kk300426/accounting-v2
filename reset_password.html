<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MyAccounting Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); color: #fff; text-align: center;
        }
        h2 { margin-top: 0; margin-bottom: 25px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; padding-right: 40px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); }
        .input-group label {
            position: absolute; left: 15px; top: 12px; color: rgba(255, 255, 255, 0.5); pointer-events: none; transition: 0.3s ease all;
        }
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label {
            top: -10px; left: 10px; font-size: 12px; color: #00f2fe; background: #232239; padding: 0 5px; border-radius: 4px;
        }
        
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: rgba(255,255,255,0.5); }
        
        .btn-custom {
            width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: white;
            padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: transform 0.3s; margin-top: 10px;
        }
        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        .btn-custom:disabled { background: linear-gradient(135deg, #a4b0be 0%, #ced6e0 100%); cursor: not-allowed; box-shadow: none; color: #57606f; transform: none;}

        .match-feedback {
            font-size: 0.85em; font-weight: 500; display: flex; align-items: center; gap: 5px; opacity: 0; transition: 0.3s; height: 0;
            margin-top: -15px; margin-bottom: 15px; text-align: left; padding-left: 10px;
        }
        .match-feedback.visible { opacity: 1; height: auto; }
        .match-feedback.match { color: #2ed573; }
        .match-feedback.mismatch { color: #ff4757; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <form onsubmit="handleReset(event)">
            <h2>Set New Password</h2>
            
            <div class="input-group">
                <input type="password" id="pw1" placeholder=" " required onkeyup="checkMatch()">
                <label>New Password</label>
                <i class="fas fa-eye toggle-password" onclick="toggleVisibility('pw1', this)"></i>
            </div>
            
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="password" id="pw2" placeholder=" " required onkeyup="checkMatch()">
                <label>Confirm Password</label>
                <i class="fas fa-eye toggle-password" onclick="toggleVisibility('pw2', this)"></i>
            </div>
            
            <div class="match-feedback" id="matchFeedback">
                <i class="fas fa-times-circle"></i> Passwords do not match
            </div>
            
            <button type="submit" class="btn-custom" id="submitBtn" disabled>Update Password</button>
            
        </form>
    </div>

    <script>
        // Start by ensuring we have a valid session context
        window.onload = function() {
            if(!localStorage.getItem("resetEmail")) {
                alert("Session Expired. Please restart the password recovery process.");
                window.location.href = "forget_password.html";
            }
        };

        function toggleVisibility(id, icon) {
            const el = document.getElementById(id);
            if(el.type === "password") {
                el.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                el.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function checkMatch() {
            const pw1 = document.getElementById("pw1").value;
            const pw2 = document.getElementById("pw2").value;
            const feedback = document.getElementById("matchFeedback");
            const btn = document.getElementById("submitBtn");
            
            if (pw2.length === 0 && pw1.length === 0) {
                feedback.classList.remove('visible');
                btn.disabled = true;
                return;
            }

            feedback.classList.add('visible');
            
            if(pw1 === pw2 && pw1.length > 5) {
                feedback.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match and valid';
                feedback.className = 'match-feedback visible match';
                btn.disabled = false;
            } else {
                feedback.innerHTML = pw1 !== pw2 ? '<i class="fas fa-times-circle"></i> Passwords do not match' : '<i class="fas fa-exclamation-circle"></i> Password must be >5 chars';
                feedback.className = 'match-feedback visible mismatch';
                btn.disabled = true;
            }
        }

        function handleReset(e) {
            e.preventDefault();
            const email = localStorage.getItem("resetEmail");
            const pw1 = document.getElementById("pw1").value;
            const pw2 = document.getElementById("pw2").value;
            
            if (!email) return alert("Session expired. Go back.");
            if (pw1 !== pw2 || pw1.length < 6) return alert("Invalid passwords.");
            
            saveUser(email, pw1);
            localStorage.removeItem("resetEmail");
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Updated!';
            btn.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
            btn.style.boxShadow = '0 6px 20px rgba(17, 153, 142, 0.5)';
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 800);
        }
    </script>
</body>
</html>
