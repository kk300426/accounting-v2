<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MyAccounting Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: #fff;
            text-align: center;
        }
        h2 { margin-top: 0; margin-bottom: 30px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; letter-spacing: 1px;}
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; padding-right: 40px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); }
        .input-group label {
            position: absolute; left: 15px; top: 12px; color: rgba(255, 255, 255, 0.5); pointer-events: none; transition: 0.3s ease all;
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -10px; left: 10px; font-size: 12px; color: #00f2fe; background: #232239; padding: 0 5px; border-radius: 4px;
        }
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: rgba(255,255,255,0.5); }
        .toggle-password:hover { color: #fff; }
        .options-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 0.9em; }
        .options-row a { color: #00f2fe; text-decoration: none; transition: 0.3s; }
        .options-row a:hover { text-shadow: 0 0 8px rgba(0, 242, 254, 0.5); }
        .btn-custom {
            width: 100%; background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            border: none; color: white; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1.1em;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4); transition: transform 0.3s;
        }
        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 114, 255, 0.6); }
        .bottom-link { margin-top: 25px; display: block; font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .bottom-link a { color: #00f2fe; text-decoration: none; font-weight: 600; margin-left: 5px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    </style>
</head>
<body onload="checkRememberMe()">
    <div class="glass-panel">
        <form onsubmit="handleLogin(event)">
            <h2>Welcome Back</h2>
            
            <div class="input-group">
                <input type="email" id="email" required>
                <label>Email Address</label>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" required>
                <label>Password</label>
                <i class="fas fa-eye toggle-password" onclick="toggleVisibility('password', this)"></i>
            </div>
            
            <div class="options-row">
                <label class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="forget_password.html">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn-custom">Login</button>
            
            <div class="bottom-link">
                Don't have an account? <a href="create_account.html">Sign Up</a>
            </div>
        </form>
    </div>

    <script>
        function checkRememberMe() {
            const savedEmail = localStorage.getItem("rememberedEmail");
            if(savedEmail) {
                document.getElementById("email").value = savedEmail;
                document.getElementById("rememberMe").checked = true;
            }
        }

        function toggleVisibility(id, icon) {
            const el = document.getElementById(id);
            if(el.type === "password") {
                el.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                el.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const remember = document.getElementById("rememberMe").checked;
            
            if (validateLogin(email, password)) {
                if(remember) {
                    localStorage.setItem("rememberedEmail", email);
                } else {
                    localStorage.removeItem("rememberedEmail");
                }
                
                localStorage.setItem("currentUser", email);
                
                // Show a brief success animation/alert before redirect
                const btn = document.querySelector('.btn-custom');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Success!';
                btn.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                
                setTimeout(() => {
                    window.location.href = "perfect.html";
                }, 800);
            } else {
                alert("Invalid email or password.");
            }
        }
    </script>
</body>
</html>
