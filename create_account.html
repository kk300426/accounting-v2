<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - MyAccounting Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); color: #fff; text-align: center;
        }
        h2 { margin-top: 0; margin-bottom: 25px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        .input-group input {
            width: 100%; padding: 12px 15px; padding-right: 40px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); }
        .input-group label {
            position: absolute; left: 15px; top: 12px; color: rgba(255, 255, 255, 0.5); pointer-events: none; transition: 0.3s ease all;
        }
        /* Hide label if input is not empty by reacting to :valid or :placeholder-shown */
        .input-group input:focus ~ label, .input-group input:not(:placeholder-shown) ~ label {
            top: -10px; left: 10px; font-size: 12px; color: #00f2fe; background: #232239; padding: 0 5px; border-radius: 4px;
        }
        
        .toggle-password { position: absolute; right: 15px; top: 14px; cursor: pointer; color: rgba(255,255,255,0.5); }
        .btn-custom {
            width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: white;
            padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: transform 0.3s; margin-top: 10px;
        }
        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }
        .bottom-link { margin-top: 25px; display: block; font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .bottom-link a { color: #00f2fe; text-decoration: none; font-weight: 600; margin-left: 5px; }

        /* Strength Meter */
        .strength-meter { height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; margin-top: 5px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0%; transition: 0.3s; border-radius: 5px; }
        .strength-text { font-size: 0.8em; text-align: right; margin-top: 5px; color: rgba(255,255,255,0.5); font-weight: 500;}
        
        /* Colors for strength */
        .weak { background: #ff4757; width: 33%; }
        .medium { background: #ffa502; width: 66%; }
        .strong { background: #2ed573; width: 100%; }
        .txt-weak { color: #ff4757; }
        .txt-medium { color: #ffa502; }
        .txt-strong { color: #2ed573; }
    </style>
</head>
<body>
    <div class="glass-panel">
        <form onsubmit="handleSignup(event)">
            <h2>Sign Up</h2>
            
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label>Email Address</label>
            </div>
            
            <div class="input-group" style="margin-bottom: 5px;">
                <input type="password" id="pw1" placeholder=" " required onkeyup="checkStrength()">
                <label>Create Password</label>
                <i class="fas fa-eye toggle-password" onclick="toggleVisibility('pw1', this)"></i>
            </div>
            <div class="strength-meter"><div class="strength-bar" id="strengthBar"></div></div>
            <div class="strength-text" id="strengthText">Password Strength</div>
            <br>
            
            <div class="input-group">
                <input type="password" id="pw2" placeholder=" " required>
                <label>Confirm Password</label>
                <i class="fas fa-eye toggle-password" onclick="toggleVisibility('pw2', this)"></i>
            </div>
            
            <button type="submit" class="btn-custom">Create Account</button>
            
            <div class="bottom-link">
                Already have an account? <a href="login.html">Log In</a>
            </div>
        </form>
    </div>

    <script>
        function toggleVisibility(id, icon) {
            const el = document.getElementById(id);
            if(el.type === "password") {
                el.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                el.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        function checkStrength() {
            const val = document.getElementById('pw1').value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            
            if(val.length === 0) {
                bar.className = 'strength-bar';
                txt.textContent = 'Password Strength';
                txt.className = 'strength-text';
                return;
            }

            let strength = 0;
            if(val.length >= 6) strength += 1;
            if(val.match(/[A-Z]/)) strength += 1;
            if(val.match(/[0-9]/)) strength += 1;
            if(val.match(/[^a-zA-Z0-9]/)) strength += 1;

            if(strength <= 1) {
                bar.className = 'strength-bar weak';
                txt.textContent = 'Weak'; txt.className = 'strength-text txt-weak';
            } else if(strength === 2 || strength === 3) {
                bar.className = 'strength-bar medium';
                txt.textContent = 'Medium'; txt.className = 'strength-text txt-medium';
            } else {
                bar.className = 'strength-bar strong';
                txt.textContent = 'Strong'; txt.className = 'strength-text txt-strong';
            }
        }

        function handleSignup(e) {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const pw1 = document.getElementById("pw1").value;
            const pw2 = document.getElementById("pw2").value;
            
            if (userExists(email)) return alert("User already exists.");
            if (pw1 !== pw2) return alert("Passwords do not match.");
            if (pw1.length < 6) return alert("Password must be at least 6 characters.");
            
            saveUser(email, pw1);
            
            // Show a brief success animation/alert before redirect
            const btn = document.querySelector('.btn-custom');
            btn.innerHTML = '<i class="fas fa-check-circle"></i> Account Created!';
            btn.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
            btn.style.boxShadow = '0 6px 20px rgba(17, 153, 142, 0.5)';
            
            setTimeout(() => {
                window.location.href = "login.html";
            }, 800);
        }
    </script>
</body>
</html>
