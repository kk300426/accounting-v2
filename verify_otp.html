<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - MyAccounting Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
        emailjs.init("yFSFUYsNrUcc_dUo_");
    </script>
    <script src="auth.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif; margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #0f2027); background-size: 400% 400%;
            animation: gradientBG 15s ease infinite; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); color: #fff; text-align: center;
        }
        h2 { margin-top: 0; margin-bottom: 25px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .instruction { font-size: 0.9em; color: rgba(255,255,255,0.7); margin-bottom: 25px; line-height: 1.5; }
        
        .otp-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .otp-group input {
            width: 45px; height: 50px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; color: #fff; text-align: center; font-size: 1.5em; font-weight: 600; outline: none; transition: 0.3s;
        }
        .otp-group input:focus { border-color: #00f2fe; box-shadow: 0 0 8px rgba(0, 242, 254, 0.3); transform: scale(1.05); }
        .otp-group input::-webkit-outer-spin-button, .otp-group input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .btn-custom {
            width: 100%; background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%); border: none; color: white;
            padding: 12px; border-radius: 8px; font-weight: 600; font-size: 1.1em; cursor: pointer;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4); transition: transform 0.3s;
        }
        .btn-custom:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.6); }

        .resend-container { margin-top: 25px; font-size: 0.9em; color: rgba(255,255,255,0.7); }
        .timer-text { font-weight: bold; color: #ff9f43; }
        .resend-link { color: #57606f; cursor: not-allowed; text-decoration: none; pointer-events: none; transition: 0.3s; font-weight: 600; }
        .resend-link.active { color: #00f2fe; cursor: pointer; pointer-events: auto; }
        .resend-link.active:hover { text-shadow: 0 0 8px rgba(0, 242, 254, 0.5); }
    </style>
</head>
<body onload="initOTP()">
    <div class="glass-panel">
        <form id="otpForm" onsubmit="handleVerifyOTP(event)">
            <h2>Verify Email</h2>
            <p class="instruction">We've sent a 6-digit confirmation code to your email. Enter it below to securely reset your password.</p>
            
            <div class="otp-group" id="otpInputs">
                <input type="number" maxlength="1" required autofocus>
                <input type="number" maxlength="1" required>
                <input type="number" maxlength="1" required>
                <input type="number" maxlength="1" required>
                <input type="number" maxlength="1" required>
                <input type="number" maxlength="1" required>
            </div>
            
            <button type="submit" class="btn-custom" id="verifyBtn">Verify OTP</button>
            
            <div class="resend-container">
                Didn't receive the code? <br>
                <a class="resend-link" id="resendLink" onclick="resendOTP()">Resend OTP</a> 
                <span id="timerSpan">in <span class="timer-text" id="timer">60</span>s</span>
            </div>
        </form>
    </div>

    <script>
        function initOTP() {
            const inputs = document.querySelectorAll('.otp-group input');
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    const val = input.value;
                    if(val.length > 1) input.value = val.slice(0, 1);
                    if(val.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });
                
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !input.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });
            startTimer();
        }

        let timeLeft = 60;
        let timerInterval;

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            const timerEl = document.getElementById('timer');
            const link = document.getElementById('resendLink');
            const timerSpan = document.getElementById('timerSpan');
            
            link.classList.remove('active');
            timerSpan.style.display = 'inline';
            timerEl.innerText = timeLeft;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerSpan.style.display = 'none';
                    link.classList.add('active');
                }
            }, 1000);
        }

        function resendOTP() {
            if(!document.getElementById('resendLink').classList.contains('active')) return;
            
            const email = localStorage.getItem("resetEmail");
            if(!email) {
                alert("Session expired. Please start over.");
                window.location.href = "forget_password.html";
                return;
            }

            const link = document.getElementById('resendLink');
            link.innerHTML = 'Sending...';
            link.classList.remove('active');

            const newOtp = Math.floor(100000 + Math.random() * 900000);
            localStorage.setItem("otp", newOtp);
            
            // Simulating an email send without an API key (Development Mode)
            setTimeout(() => {
                alert("🛠️ DEV MODE: A new OTP email would be sent here.\n\nYour NEW OTP code is: " + newOtp);
                
                alert("A new OTP has been sent to your email!");
                startTimer();
                link.innerHTML = 'Resend OTP';
            }, 1000);
        }

        function handleVerifyOTP(e) {
            e.preventDefault();
            const inputs = document.querySelectorAll('.otp-group input');
            let entered = "";
            inputs.forEach(inp => entered += inp.value);
            
            const actual = localStorage.getItem("otp");
            
            if (entered === String(actual)) {
                const btn = document.getElementById('verifyBtn');
                btn.innerHTML = '<i class="fas fa-check-circle"></i> Verified!';
                btn.style.background = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                localStorage.removeItem("otp");
                setTimeout(() => {
                    window.location.href = "reset_password.html";
                }, 800);
            } else {
                alert("Incorrect OTP. Please check the code and try again.");
                inputs.forEach(inp => inp.value = '');
                inputs[0].focus();
            }
        }
    </script>
</body>
</html>
